<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recroogle — Recruitment search engine</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <div id="hero">
      <div id="logo">
        <span class="logo-r">R</span>
        <span class="logo-e1">e</span>
        <span class="logo-c">c</span>
        <span class="logo-r2">r</span>
        <span class="logo-o">o</span>
        <span class="logo-o2">o</span>
        <span class="logo-g">g</span>
        <span class="logo-l">l</span>
        <span class="logo-e2">e</span>
      </div>
      <p class="tagline">Recruitment search engine</p>

      <form id="search-form">
        <div class="search-container">
          <div class="search-icon">
            <svg viewBox="0 0 24 24" width="20" height="20">
              <path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
          </div>
          <input
            type="text"
            id="search-input"
            class="search-input"
            placeholder="Search for talent..."
            autocomplete="off"
            spellcheck="false"
          />
          <div id="clear-btn" class="clear-btn hidden">
            <svg viewBox="0 0 24 24" width="20" height="20">
              <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
          </div>
        </div>

        <div class="buttons">
          <button type="submit" class="search-btn">Recroogle Search</button>
        </div>
      </form>
    </div>

    <div id="results" class="results hidden">
      <div class="result-count" id="result-count"></div>
      <div class="profile-card" id="profile-card"></div>
    </div>
  </div>

  <footer>
    <p>Made with ❤️ for recruitment</p>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
